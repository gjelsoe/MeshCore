; Shared base for all Radiomaster Bandit variants (Bandit + Bandit Nano)
[radiomaster_900_bandit_base]
extends = esp32_base
board = radiomaster_bandit
build_flags =
  ${esp32_base.build_flags}
  -I variants/radiomaster_900_bandit
  -D SX127X_CURRENT_LIMIT=120
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D SX176X_TXEN=33
  -D MAX_LORA_TX_POWER=30
  -D LORA_TX_POWER=20
  -D PIN_BOARD_SDA=14
  -D PIN_BOARD_SCL=12
  -D PIN_USER_JOYSTICK=39
  -D ENV_INCLUDE_GPS=0

build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/radiomaster_900_bandit>
  +<helpers/ui/AnalogJoystick.cpp>
  +<helpers/sensors>

; ===================================================================
; Radiomaster Bandit (SH1115 OLED + 6x NeoPixels)
; ===================================================================

[radiomaster_900_bandit]
extends = radiomaster_900_bandit_base
build_flags =
  ${radiomaster_900_bandit_base.build_flags}
  -D RADIOMASTER_900_BANDIT
  -D DISPLAY_CLASS=SH1115Display        ; SH1115 driver available at https://github.com/gjelsoe/Adafruit_SH110x
                                        ; The SH1106 will work, but there are some small pixels misplacement.
  -D NEW_MSG_LED=0x0000FF               ; Blue message notification LED color, 0x000000 to disable.
  -D TX_LED_COLOR=0x009600              ; Green TX LED color, 0x000000 to disable.
  -D PIN_NEOPIXEL=15                    ; Data GPIO of the NEOPIXELS.
  -D NEOPIXEL_NUM=6                     ; Number of NEOPIXELS.

build_src_filter = ${radiomaster_900_bandit_base.build_src_filter}
  +<helpers/ui/SH1115Display.cpp>

lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit NeoPixel@^1.10.0
  https://github.com/gjelsoe/Adafruit_SH110x

[env:radiomaster_900_bandit_companion_radio_ble]
extends = radiomaster_900_bandit
build_flags =
  ${radiomaster_900_bandit.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=160
  -D MAX_GROUP_CHANNELS=8
  -D BLE_PIN_CODE=123456
;  -D BLE_DEBUG_LOGGING=1
  -D OFFLINE_QUEUE_SIZE=256
;  -D RADIOLIB_DEBUG_BASIC=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1

build_src_filter = ${radiomaster_900_bandit.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>

lib_deps =
  ${radiomaster_900_bandit.lib_deps}
  densaugeo/base64 @ ~1.4.0

[env:radiomaster_900_bandit_repeater]
extends = radiomaster_900_bandit
build_flags =
  ${radiomaster_900_bandit.build_flags}
  -D ADVERT_NAME='"Radiomaster Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D PERSISTANT_GPS=1
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1

build_src_filter = ${radiomaster_900_bandit.build_src_filter}
  +<../examples/simple_repeater>

lib_deps =
  ${radiomaster_900_bandit.lib_deps}
  ${esp32_ota.lib_deps}

[env:radiomaster_900_bandit_room_server]
extends = radiomaster_900_bandit
build_flags =
  ${radiomaster_900_bandit.build_flags}
  -D ADVERT_NAME='"Radiomaster Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1

build_src_filter = ${radiomaster_900_bandit.build_src_filter}
  +<../examples/simple_room_server>

lib_deps =
  ${radiomaster_900_bandit.lib_deps}
  ${esp32_ota.lib_deps}

; ===================================================================
; Radiomaster Bandit Nano (SSD1306 OLED, no NeoPixels)
; ===================================================================

[radiomaster_900_bandit_nano]
extends = radiomaster_900_bandit_base
build_flags =
  ${radiomaster_900_bandit_base.build_flags}
  -D RADIOMASTER_900_BANDIT_NANO
  -D DISPLAY_CLASS=SSD1306Display
  -D P_LORA_TX_LED=15
  -D DISPLAY_ROTATION=2                 ; Display is flipped

build_src_filter = ${radiomaster_900_bandit_base.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>

lib_deps =
  ${esp32_base.lib_deps}
  adafruit/Adafruit SSD1306 @ ^2.5.13

